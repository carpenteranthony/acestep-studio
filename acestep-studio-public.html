<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACE Remix Tool</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px }
textarea { width:100%; height:120px; margin-top:10px; background:#000; color:#0f0 }
button { margin-top:10px; padding:10px; }
</style>
</head>
<body>

<h2>ACE Audio Remix (HIGH QUALITY MODE)</h2>

<input id="audioUrl" placeholder="Paste audio URL (MP3/WAV)" style="width:100%;padding:10px"/>

<h3>Tags (EDIT BEFORE RENDER)</h3>
<textarea id="tags">
latin pop, live percussion, warm bass, organic drums, full arrangement, instrumental, no vocals, natural outro
</textarea>

<button onclick="runRemix()">RENDER REMIX</button>

<p id="status"></p>
<audio id="player" controls></audio>

<script>
async function runRemix(){
  const url = document.getElementById('audioUrl').value;
  const tags = document.getElementById('tags').value;
  document.getElementById('status').innerText = "Rendering...";

  const res = await fetch('https://wavespeedai.anthony-3ce.workers.dev/proxy/api/v3/wavespeed-ai/ace-step-audio-to-audio', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      audio_url: url,
      tags: tags,
      edit_mode: "remix",
      lyrics: "[inst]"
    })
  });

  const data = await res.json();
  const id = data.data?.id;

  if(!id){
    document.getElementById('status').innerText = "Error starting job";
    return;
  }

  for(let i=0;i<120;i++){
    await new Promise(r=>setTimeout(r,2000));
    const poll = await fetch('https://wavespeedai.anthony-3ce.workers.dev/proxy/api/v3/predictions/'+id+'/result');
    const out = await poll.json();
    if(out.status==="completed"){
      document.getElementById('player').src = out.output[0];
      document.getElementById('status').innerText = "Done";
      return;
    }
  }

  document.getElementById('status').innerText = "Timeout";
}
</script>

</body>
</html>
